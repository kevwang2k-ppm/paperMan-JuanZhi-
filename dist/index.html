<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- iOS 启动画面（使用现有图标居中显示） -->
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>Web Fastlane - 快速试卷整理</title>
    <meta name="description" content="PaperManager Web Fastlane - 移动端快速试卷整理工具" />
    <script type="module" crossorigin src="/assets/index-B_Fv5_39.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/vendor-BsjjraQb.js">
    <link rel="stylesheet" crossorigin href="/assets/index-qS56vz6d.css">
  </head>
  <body>
    <!-- PWA 启动画面 -->
    <div id="splash-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #3b82f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    ">
      <img src="/apple-touch-icon.png" alt="Logo" style="width: 120px; height: 120px; border-radius: 24px; margin-bottom: 24px;">
      <h1 style="color: white; font-size: 24px; font-weight: 600; margin: 0;">Web Fastlane</h1>
    </div>
    <div id="app"></div>
    <script>
      // 页面加载完成后隐藏启动画面
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(function() {
              splash.style.display = 'none';
            }, 300);
          }
        }, 800); // 显示至少 800ms，让用户看清
      });
    </script>
  </body>
</html>
